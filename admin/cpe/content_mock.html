<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MEGASTUDYMATH 어드민 - 모의고사 원리익힘</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; font-size: 12px; }
        body { display: flex; flex-direction: column; height: 100vh; background-color: #fff; overflow: hidden; }
        .content-title-area { background-color: #eef3f9; padding: 15px 20px; border-bottom: 1px solid #d9e2ec; }
        .content-title-area h2 { font-size: 18px; color: #222; font-weight: bold; margin-bottom: 4px; }
        .content-title-area p { color: #8898aa; font-size: 11px; }
        .work-area { display: flex; flex: 1; overflow: hidden; }
        .tree-section { width: 250px; border-right: 1px solid #dfdfdf; display: flex; flex-direction: column; }
        .tree-filter { padding: 10px; background-color: #f7f9fa; border-bottom: 1px solid #dfdfdf; display: flex; gap: 4px; }
        .tree-filter select { padding: 2px; border: 1px solid #ccd1d9; font-size: 11px; }
        .tree-filter button { padding: 2px 6px; border: 1px solid #ccd1d9; background: #fff; cursor: pointer; }
        .tree-container { flex: 1; padding: 10px; overflow-y: auto; }
        .tree-root { font-weight: bold; margin-bottom: 5px; color: #444; }
        .tree-list { list-style: none; padding-left: 15px; }
        .tree-list li { padding: 4px 0; cursor: pointer; color: #555; }
        .tree-list li.selected { background-color: #d2e4f7; color: #0056b3; font-weight: bold; border-radius: 2px; padding-left: 5px; }
        .table-section { flex: 1; padding: 15px; overflow-y: auto; }
        .table-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .table-top-bar .info-text { font-size: 12px; color: #333; font-weight: bold; }
        .table-top-bar button { padding: 3px 8px; font-size: 11px; border: 1px solid #bbb; background: #f8f9fa; cursor: pointer; border-radius: 2px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .data-table th, .data-table td { border: 1px solid #dfdfdf; padding: 6px 8px; text-align: center; }
        .data-table th { background-color: #f2f4f7; font-weight: bold; color: #444; }
        .data-table td input[type="text"] { text-align: center; padding: 2px; border: 1px solid #ddd; width: 35px; }
        .badge-mock { display: inline-block; padding: 2px 5px; border-radius: 3px; font-size: 10px; color: #fff; font-weight: bold; background-color: #007bff; }
    </style>
</head>
<body>
    <div class="content-title-area">
        <h2>모의고사 원리익힘</h2>
        <p>개년별 전국연합학력평가 및 기출 모의고사 평가 문항 연동 관리</p>
    </div>
    <div class="work-area">
        <section class="tree-section">
            <div class="tree-filter">
                <select><option>2026년</option></select>
                <select><option>고1</option></select>
                <button>+</button><button>-</button>
            </div>
            <div class="tree-container">
                <div class="tree-root">📁 고1 기출</div>
                <ul class="tree-list">
                    <li class="selected">📄 3월 학력평가</li>
                    <li>📄 6월 학력평가</li>
                    <li>📄 9월 학력평가</li>
                </ul>
            </div>
        </section>
        <section class="table-section">
            <div class="table-top-bar">
                <div class="info-text">고1 3월 전국연합학력평가 연동셋</div>
                <div>
                    <button style="margin-right:3px;">+모의고사추가</button>
                    <button>↕ 순번변경</button>
                </div>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width:50px;">순번</th>
                        <th style="width:90px;">문항ID</th>
                        <th style="width:100px;">시행기관</th>
                        <th>기출 문항 파일명</th>
                        <th style="width:70px;">배점</th>
                        <th style="width:60px;">정답률</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input type="text" value="1"></td>
                        <td>MC26101</td>
                        <td><span class="badge-mock">서울시교육청</span></td>
                        <td>MOCK_G1_2603_Q01.png</td>
                        <td>3점</td>
                        <td>85%</td>
                    </tr>
                    <tr>
                        <td><input type="text" value="2"></td>
                        <td>MC26102</td>
                        <td><span class="badge-mock">서울시교육청</span></td>
                        <td>MOCK_G1_2603_Q02.png</td>
                        <td>4점</td>
                        <td>42%</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </div>
</body>
</html>

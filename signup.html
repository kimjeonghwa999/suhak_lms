<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 회원가입 - 프로토타입</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col justify-between">

    <header class="p-6 max-w-6xl w-full mx-auto flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <img src="https://icons8.com" alt="로고" class="h-10 object-contain">
            <!-- 💡 실시간 연동 매핑 영역 -->
            <span id="sync-brand-name" class="text-xl font-bold tracking-tight text-slate-700">교육공감수학(주)</span>
        </div>
        <a href="index.html" class="text-xs bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full hover:bg-blue-600 hover:text-white transition font-medium">← 돌아가기</a>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 mb-20">
        <div class="max-w-md w-full p-10 bg-white rounded-2xl shadow-xl shadow-slate-100 border border-slate-100">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">학생 회원가입</h2>
                <p class="text-sm text-slate-400 mt-2">정보를 입력하여 가입을 진행해 주세요.</p>
            </div>
            <form class="space-y-5" onsubmit="event.preventDefault();">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">아이디</label>
                    <div class="flex space-x-2">
                        <input type="text" id="user-id" placeholder="아이디를 입력하세요" class="flex-1 p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 text-sm">
                        <button type="button" onclick="alert('사용 가능한 아이디입니다.')" class="bg-slate-880 text-white px-4 text-xs font-bold rounded-xl hover:bg-slate-700 transition">중복체크</button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">학생 이름</label>
                    <input type="text" placeholder="이름을 입력하세요" class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 text-sm">
                </div>
                <button type="button" onclick="alert('회원가입 완료 시연'); location.href='index.html';" class="w-full bg-blue-600 text-white p-3.5 font-bold rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-100 mt-4">회원가입 완료</button>
            </form>
        </div>
    </main>

    <script>
        window.onload = function() {
            // 저장소에서 커스텀 이름을 읽어와 상단 로고 텍스트 교체
            document.getElementById('sync-brand-name').innerText = localStorage.getItem('custom_center_name') || "교육공감수학(주)";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학원 관리 시스템 - 신규 등록</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f6f9; margin: 0; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .register-container { background: #ffffff; width: 100%; max-width: 600px; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        h2 { color: #1e2d42; text-align: center; margin-top: 0; margin-bottom: 30px; font-size: 24px; border-bottom: 2px solid #e9ecef; padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #495057; font-size: 14px; }
        input[type="text"], input[type="tel"], select { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; font-size: 15px; transition: border-color 0.2s; box-sizing: border-box; }
        input:focus, select:focus { border-color: #1e2d42; outline: none; box-shadow: 0 0 0 3px rgba(30, 45, 66, 0.1); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* 🛠️ 현재 디자인에 딱 맞춘 주소 검색 영역 스타일 */
        .address-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn-search-addr { background-color: #2c3e50; color: white; border: none; padding: 0 20px; border-radius: 6px; font-weight: bold; cursor: pointer; white-space: nowrap; font-size: 14px; transition: background 0.2s; }
        .btn-search-addr:hover { background-color: #1a252f; }
        .readonly-bg { background-color: #fafafa; cursor: not-allowed; }

        .btn-submit { width: 100%; background-color: #1e2d42; color: white; padding: 14px; font-size: 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 20px; transition: background-color 0.2s; }
        .btn-submit:hover { background-color: #111a26; }
        .btn-back { display: block; text-align: center; margin-top: 15px; color: #6c757d; text-decoration: none; font-size: 14px; }
        .btn-back:hover { text-decoration: underline; }
    </style>
    
    <!-- 🔗 Daum 카카오 우편번호 서비스 라이브러리 탑재 -->
    <script src="https://daumcdn.net"></script>
</head>
<body>

    <div class="register-container">
        <h2>🏢 신규 가맹 학원 등록</h2>
        
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="academyName">학원명 <span style="color:red;">*</span></label>
                <input type="text" id="academyName" placeholder="등록할 학원 이름을 입력하세요" required>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="ownerName">원장명 <span style="color:red;">*</span></label>
                    <input type="text" id="ownerName" placeholder="원장님 성함" required>
                </div>
                <div class="form-group">
                    <label for="academyType">학원 형태</label>
                    <select id="academyType">
                        <option value="단과 학원">단과 학원</option>
                        <option value="종합 학원">종합 학원</option>
                        <option value="교습소/공부방">교습소/공부방</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="academyPhone">대표 연락처 <span style="color:red;">*</span></label>
                <input type="tel" id="academyPhone" placeholder="예: 02-1234-5678 또는 010-0000-0000" required>
            </div>

            <div class="form-group">
                <label for="businessNumber">사업자 등록번호</label>
                <input type="text" id="businessNumber" placeholder="000-00-00000">
            </div>

            <!-- 🛠️ 깔끔하게 녹아든 카카오 주소 검색 레이아웃 -->
            <div class="form-group">
                <label>학원 주소</label>
                <div class="address-row">
                    <input type="text" id="postcode" placeholder="우편번호" class="readonly-bg" readonly style="max-width: 150px;">
                    <button type="button" class="btn-search-addr" onclick="execDaumPostcode()">주소 검색</button>
                </div>
                <input type="text" id="academyAddress" placeholder="기본 주소 (검색 시 자동 입력)" class="readonly-bg" readonly style="margin-bottom: 10px;">
                <input type="text" id="detailAddress" placeholder="상세 주소를 입력하세요 (예: 3층 301호)">
            </div>

            <button type="submit" class="btn-submit">새로운 학원 등록하기</button>
        </form>

        <a href="list.html" class="btn-back">← 학원 목록 페이지로 돌아가기</a>
    </div>

    <script>
        function execDaumPostcode() {
            new daum.Postcode({
                oncomplete: function(data) {
                    let addr = '';
                    if (data.userSelectedType === 'R') {
                        addr = data.roadAddress;
                    } else {
                        addr = data.jibunAddress;
                    }
                    // 주소창 값 매칭
                    document.getElementById('postcode').value = data.zonecode;
                    document.getElementById('academyAddress').value = addr;
                    document.getElementById('detailAddress').focus();
                }
            }).open();
        }

        function handleRegister(event) {
            event.preventDefault();
            const academyData = {
                name: document.getElementById('academyName').value,
                owner: document.getElementById('ownerName').value,
                type: document.getElementById('academyType').value,
                phone: document.getElementById('academyPhone').value,
                businessNum: document.getElementById('businessNumber').value,
                address: document.getElementById('academyAddress').value,
                detail: document.getElementById('detailAddress').value
            };
            alert(`🎉 [${academyData.name}] 학원이 가맹 시스템에 등록되었습니다!`);
            document.getElementById('registerForm').reset();
        }
    </script>

</body>
</html>

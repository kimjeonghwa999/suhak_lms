<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학원 관리 시스템 - 목록</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        .header-box { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2c3e50; padding-bottom: 15px; margin-bottom: 20px; }
        h2 { color: #2c3e50; margin: 0; }
        .btn-go-register { background-color: #2ecc71; color: white; padding: 10px 20px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; transition: background-color 0.2s; }
        .btn-go-register:hover { background-color: #27ae60; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e9ecef; }
        th { background-color: #2c3e50; color: white; font-weight: 600; }
        tr:hover { background-color: #f8f9fa; }
        .delete-btn { background-color: #dc3545; color: white; padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
        .delete-btn:hover { background-color: #bd2130; }
    </style>
</head>
<body>

    <div class="header-box">
        <h2>🏢 가맹 학원 목록 관리</h2>
        <!-- 🔗 같은 폴더 내 register.html로 이동하도록 수정 완료 -->
        <button class="btn-go-register" onclick="location.href='register.html'">➕ 신규 학원 등록하기</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>학원명</th>
                <th>원장명</th>
                <th>대표 연락처</th>
                <th>구분</th>
                <th>학원 주소</th>
                <th style="width: 80px;">관리</th>
            </tr>
        </thead>
        <tbody id="academyTableBody">
            <tr>
                <td><strong>기본 샘플 학원</strong></td>
                <td>홍길동</td>
                <td>02-123-4567</td>
                <td>종합 학원</td>
                <td>서울시 마포구 독막로</td>
                <td><button class="delete-btn" onclick="deleteAcademy(this)">해지</button></td>
            </tr>
        </tbody>
    </table>

    <script>
        function deleteAcademy(button) {
            if(confirm("정말 이 학원의 등록을 해지하시겠습니까?")) {
                const row = button.parentElement.parentElement;
                row.remove();
            }
        }
    </script>

</body>
</html>

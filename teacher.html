<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선생님 메인 대시보드 - 프로토타입</title>
    <!-- 세련된 UI를 위한 Tailwind CSS 로드 -->
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- 상단 헤더 -->
    <header class="bg-white border-b border-slate-100 shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl w-full mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <img src="https://icons8.com" alt="로고" class="h-8 object-contain">
                <span class="text-lg font-bold tracking-tight text-slate-700">교육공감수학(주)</span>
            </div>
            <div class="flex items-center space-x-3">
                <span class="text-xs bg-emerald-50 text-emerald-600 px-2.5 py-1 rounded-full font-medium">선생님 모드</span>
                <a href="index.html" class="text-xs text-slate-400 hover:text-slate-600 transition">로그아웃</a>
            </div>
        </div>
    </header>

    <!-- 메인 콘텐츠 (좌/우 2단 레이아웃 분할) -->
    <main class="max-w-7xl w-full mx-auto px-6 py-8 flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- [좌측 7칸] 코스 선택 및 콘텐츠 본문 -->
        <section class="lg:col-span-7 space-y-6">
            
            <!-- 필터 바 및 [학생/클래스] 전환 탭 -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">과정 선택</label>
                        <div class="inline-flex p-1 bg-slate-100 rounded-xl">
                            <button onclick="changeCourse('elementary')" id="btn-elem" class="px-4 py-2 text-sm font-bold rounded-lg transition-all bg-white text-blue-600 shadow-sm">초등과정</button>
                            <button onclick="changeCourse('middle')" id="btn-mid" class="px-4 py-2 text-sm font-semibold rounded-lg transition-all text-slate-500 hover:text-slate-700">중등과정</button>
                            <button onclick="changeCourse('high')" id="btn-high" class="px-4 py-2 text-sm font-semibold rounded-lg transition-all text-slate-500 hover:text-slate-700">고등과정</button>
                        </div>
                    </div>
                    
                    <div class="flex items-center space-x-3 self-end">
                        <select id="class-select" class="bg-slate-50 border border-slate-200 text-sm font-medium rounded-xl p-2.5 focus:outline-none focus:border-blue-500 focus:bg-white transition"></select>
                        
                        <!-- 구식 버튼을 트렌디한 토글 탭으로 변경 -->
                        <div class="bg-slate-100 p-1 rounded-xl flex">
                            <button onclick="switchTab('student')" id="tab-student" class="px-4 py-1.5 text-xs font-semibold text-slate-500 rounded-lg transition-all">학생</button>
                            <button onclick="switchTab('class')" id="tab-class" class="px-4 py-1.5 text-xs font-bold text-slate-700 bg-white shadow-sm rounded-lg transition-all">클래스</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 1. [클래스 뷰] 단원 리스트 (기본 노출) -->
            <div id="view-class" class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="bg-slate-800 text-white p-5 flex items-center justify-between">
                    <div>
                        <h3 id="panel-title" class="font-bold text-base tracking-tight">초등 4-1 과정 목록</h3>
                        <p class="text-xs text-slate-400 mt-0.5">단원을 클릭하면 세부 학습 요소가 펼쳐집니다.</p>
                    </div>
                    <span class="text-xs bg-slate-700 text-slate-300 px-2.5 py-1 rounded-md font-mono" id="chapter-count">Chapter 3</span>
                </div>
                <div id="chapter-list" class="divide-y divide-slate-100"></div>
            </div>

            <!-- 2. [학생 뷰] 학생 진도 현황 테이블 (기본 숨김) -->
            <div id="view-student" class="hidden bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="p-5 border-b border-slate-100 flex items-center justify-between bg-slate-50">
                    <div>
                        <h3 class="font-bold text-base text-slate-800">전체 학생 진도 현황</h3>
                        <p class="text-xs text-slate-400 mt-0.5">클래스별 학생들의 실시간 진행률과 학습 단계입니다.</p>
                    </div>
                    <input type="text" id="student-search" onkeyup="searchStudent()" placeholder="학생 이름 검색..." class="p-2 border border-slate-200 rounded-xl text-xs focus:outline-none focus:border-blue-500 bg-white w-40">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-xs">
                        <thead>
                            <tr class="bg-slate-100/70 text-slate-500 font-bold border-b border-slate-150">
                                <th class="p-4 w-12 text-center">No.</th>
                                <th class="p-4">학생명</th>
                                <th class="p-4">학습과정</th>
                                <th class="p-4 w-44">진행률</th>
                                <th class="p-4">학습단계</th>
                            </tr>
                        </thead>
                        <tbody id="student-table-body" class="divide-y divide-slate-100">
                            <!-- JS에서 테이블 내용이 채워집니다 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- [우측 5칸] 성적 통계 그래프 및 학생 메뉴얼 -->
        <section class="lg:col-span-5 space-y-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <h4 class="text-sm font-bold text-slate-700 mb-5 flex items-center gap-1.5">📊 실시간 클래스 성취도 현황</h4>
                <div class="grid grid-cols-3 gap-2 text-center">
                    <div class="flex flex-col items-center">
                        <div class="relative w-20 h-20 flex items-center justify-center bg-slate-50 rounded-full border-4 border-slate-150 shadow-inner">
                            <span class="text-base font-extrabold text-slate-400" id="stat-1">0%</span>
                        </div>
                        <span class="text-[11px] font-medium text-slate-500 mt-2 block break-keep">개념원리 완성도</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <div class="relative w-20 h-20 flex items-center justify-center bg-slate-50 rounded-full border-4 border-slate-150 shadow-inner">
                            <span class="text-base font-extrabold text-slate-400" id="stat-2">0%</span>
                        </div>
                        <span class="text-[11px] font-medium text-slate-500 mt-2 block break-keep">유형진단 점수평균</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <div class="relative w-20 h-20 flex items-center justify-center bg-slate-50 rounded-full border-4 border-slate-150 shadow-inner">
                            <span class="text-base font-extrabold text-slate-400" id="stat-3">0%</span>
                        </div>
                        <span class="text-[11px] font-medium text-slate-500 mt-2 block break-keep">유형익힘 완성도</span>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="bg-slate-50 border-b border-slate-100 px-5 py-3.5 flex items-center justify-between">
                    <span class="text-sm font-bold text-slate-700">📋 학습 가이드 자료</span>
                    <span class="text-[11px] text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full font-medium">학생 메뉴얼</span>
                </div>
                <div class="p-8 text-center bg-slate-900 text-white min-h-[220px] flex flex-col justify-center items-center relative group">
                    <div class="absolute inset-0 bg-gradient-to-br from-blue-900/40 to-slate-900 pointer-events-none"></div>
                    <p class="text-xs uppercase tracking-widest text-blue-400 font-bold mb-1 z-10">공익센터 교육공감(주)</p>
                    <h5 class="text-2xl font-black tracking-tight mb-4 z-10 leading-tight">학습사이트<br>공식 디지털 메뉴얼</h5>
                    <button class="z-10 bg-white/10 hover:bg-white text-white hover:text-slate-900 text-xs font-bold px-4 py-2 rounded-xl border border-white/20 transition-all active:scale-95" onclick="alert('PDF 다운로드를 시연합니다.')">📖 가이드북 열어보기</button>
                </div>
            </div>
        </section>

    </main>

    <!-- 인터랙션 스크립트 -->
    <script>
        const subItems = [
            "개념원리요소정리 (0/1 명 완료)", "개념원리요소테스트 (0/1 명 완료)", "개념원리요소익힘/연산익힘 (0/1 명 완료)",
            "수준별유형진단 1차 (0/1 명 완료)", "개인별유형익힘 1차 (0/1 명 완료)", "개인별유형과제 1차 (0/1 명 완료)"
        ];

        // 이미지에 기재되어 있던 실제 데이터 녹여내기
        const studentsData = [
            { no: 1, name: "신영일", course: "[표준18] 초4-1-4.5.6 단원", rate: "0.00%", step: "C1-개인별유형익힘 3차" },
            { no: 2, name: "이균", course: "[표준18] 초4-1-1.2.3 단원", rate: "11.90%", step: "C3-개인별유형익힘 1차" },
            { no: 3, name: "김재민", course: "[표준18] 초4-2-4.5.6 단원", rate: "0.00%", step: "C20-개인별유형익힘 4차" },
            { no: 4, name: "김래현1", course: "[표준18] 초4-2-1.2.3 단원", rate: "0.00%", step: "C13-개인별유형익힘 3차" },
      { no: 5, name: "박재욱", course: "[표준18] 초5-1-4.5.6 단원", rate: "33.33%", step: "C6-개인별유형과제 4차" },
      { no: 6, name: "안현민", course: "[표준18] 초5-1-1.2.3 단원", rate: "0.00%", step: "C1-개인별유형익힘 4차" },{ no: 7, name: "이상후", course: "[표준18] 초5-2-4.5.6 단원", rate: "0.00%", step: "C3-수준별유형진단 1차" },{ no: 8, name: "이동명", course: "[표준18] 초5-2-1.2.3 단원", rate: "0.00%", step: "C3-수준별유형진단 1차" },{ no: 9, name: "최혜린", course: "[표준18] 초6-1-4.5.6 단원", rate: "43.18%", step: "C10-개인별유형익힘 1차" },
      { no: 10, name: "변윤희", course: "[표준18] 초6-1-1.2.3 단원", rate: "0.00%", step: "C1-개념원리요소정리" }];const courseData = {elementary: { title: "초등 4-1 과정 목록", classes: ["01_초등학교과정", "02_초등심화반"], chapters: ["Chapter 1. 평면도형의 이동", "Chapter 2. 막대그래프", "Chapter 3. 규칙찾기"], stats: ["24%", "35%", "18%"] },middle: { title: "중등 1-1 과정 목록", classes: ["01_중학교기본반", "02_중등내신만점반"], chapters: ["Chapter 1. 소인수분해", "Chapter 2. 정수와 유리수", "Chapter 3. 문자와 식"], stats: ["78%", "80%", "85%"] },high: { title: "고등 수학(상) 과정 목록", classes: ["01_고등수능대비반", "02_고등기초개념반"], chapters: ["Chapter 1. 다항식의 연산", "Chapter 2. 방정식과 부등식", "Chapter 3. 도형의 방정식"], stats: ["12%", "40%", "25%"] }};window.onload = function() {renderCourse('elementary');renderStudents();};// 학생/클래스 상단 탭 스위칭 로직function switchTab(tabKey) {const btnStudent = document.getElementById('tab-student');const btnClass = document.getElementById('tab-class');const viewStudent = document.getElementById('view-student');const viewClass = document.getElementById('view-class');if(tabKey === 'student') {btnStudent.className = "px-4 py-1.5 text-xs font-bold text-slate-700 bg-white shadow-sm rounded-lg transition-all";btnClass.className = "px-4 py-1.5 text-xs font-semibold text-slate-500 rounded-lg transition-all";viewStudent.classList.remove('hidden');viewClass.classList.add('hidden');} else {btnClass.className = "px-4 py-1.5 text-xs font-bold text-slate-700 bg-white shadow-sm rounded-lg transition-all";btnStudent.className = "px-4 py-1.5 text-xs font-semibold text-slate-500 rounded-lg transition-all";viewClass.classList.remove('hidden');viewStudent.classList.add('hidden');}}// 학생 목록 테이블 렌더링 및 진행바 효과 생성function renderStudents() {const tbody = document.getElementById('student-table-body');tbody.innerHTML = '';studentsData.forEach(st => {const tr = document.createElement('tr');tr.className = "hover:bg-slate-50/80 transition student-row";// 수치 추출 (예: "11.90%" -> 11.9)const numRate = parseFloat(st.rate);// 수치에 따라 진행바 색상 분기 (0%는 회색, 있으면 파란색)const barColor = numRate > 0 ? 'bg-blue-500' : 'bg-slate-200';tr.innerHTML = <td class="p-4 text-center text-slate-400 font-mono">${st.no}</td> <td class="p-4 font-bold text-slate-800">${st.name}</td> <td class="p-4 text-slate-600">${st.course}</td> <td class="p-4"> <div class="flex items-center space-x-3"> <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden border border-slate-200/50"> <div class="${barColor} h-2 rounded-full" style="width: ${numRate || 5}%"></div> </div> <span class="font-mono font-bold text-slate-500 min-w-[45px] text-right">${st.rate}</span> </div> </td> <td class="p-4 font-medium text-slate-500"><span class="bg-slate-100 text-slate-600 px-2 py-1 rounded-md border border-slate-200/40">${st.step}</span></td>;tbody.appendChild(tr);});}// 시연용 간이 실시간 이름 검색 기능function searchStudent() {const query = document.getElementById('student-search').value.toLowerCase();const rows = document.querySelectorAll('.student-row');rows.forEach((row, i) => {const name = studentsData[i].name;if(name.includes(query)) {row.classList.remove('hidden');} else {row.classList.add('hidden');}});}function changeCourse(courseKey) {['elem', 'mid', 'high'].forEach(k => {document.getElementById(btn-${k}).className = "px-4 py-2 text-sm font-semibold rounded-lg transition-all text-slate-500 hover:text-slate-700";});const activeBtnMap = { elementary: 'elem', middle: 'mid', high: 'high' };document.getElementById(btn-${activeBtnMap[courseKey]}).className = "px-4 py-2 text-sm font-bold rounded-lg transition-all bg-white text-blue-600 shadow-sm";renderCourse(courseKey);}function renderCourse(courseKey) {const data = courseData[courseKey];document.getElementById('panel-title').innerText = data.title;document.getElementById('chapter-count').innerText = Chapter ${data.chapters.length};document.getElementById('stat-1').innerText = data.stats[0];document.getElementById('stat-2').innerText = data.stats[1];document.getElementById('stat-3').innerText = data.stats[2];const selectBox = document.getElementById('class-select');selectBox.innerHTML = '';data.classes.forEach(cls => {const opt = document.createElement('option');opt.innerText = cls;selectBox.appendChild(opt);});const listContainer = document.getElementById('chapter-list');listContainer.innerHTML = '';data.chapters.forEach((chap, index) => {const wrapper = document.createElement('div');wrapper.className = "border-b border-slate-100 last:border-0";wrapper.innerHTML = <div onclick="toggleAccordion(${index})" class="p-5 flex items-center justify-between hover:bg-slate-50/80 transition cursor-pointer bg-white group"> <span class="text-sm font-bold text-slate-700 group-hover:text-blue-600 transition">${chap}</span> <svg id="arrow-${index}" xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 text-slate-400 group-hover:text-blue-500 transition-transform duration-200"> <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /> </svg> </div> <div id="content-${index}" class="hidden bg-slate-50/50 divide-y divide-slate-100 border-t border-slate-150/40"> ${subItems.map(sub =>${sub}▶).join('')} </div> ;listContainer.appendChild(wrapper);});}function toggleAccordion(index) {const content = document.getElementById(content-${index});const arrow = document.getElementById(arrow-${index});if (content.classList.contains('hidden')) {content.classList.remove('hidden');arrow.style.transform = 'rotate(180deg)';} else {content.classList.add('hidden');arrow.style.transform = 'rotate(0deg)';}}

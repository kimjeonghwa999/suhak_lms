<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육공감(주) - 클래스관리 리스트</title>
    <!-- 외부 스타일시트 연결 -->
    <link rel="stylesheet" href="../css/mngr_list.css">
</head>
<body>

    <div class="title-bar">클래스관리 리스트</div>

    <!-- 필터 및 등록 버튼 바 -->
    <div class="filter-container">
        <div class="filter-inputs">
            <select><option>전체</option></select>
            <select><option>전과정</option></select>
            <select><option>전학년</option></select>
            <select><option>전클래스</option></select>
            <select><option>전교사</option></select>
        </div>
        <!-- 🔗 등록 버튼을 누르면 빈 모달창이 열립니다 -->
        <button class="btn-register" onclick="openRegisterModal()">클래스 등록</button>
    </div>

    <!-- 클래스 목록 테이블 -->
    <table class="class-table">
        <thead>
            <tr>
                <th style="width: 40px;" class="text-center"></th>
                <th style="width: 80px;" class="text-center">상태</th>
                <th>클래스명</th>
                <th style="width: 100px;">담당교사</th>
                <th style="width: 120px;">과정/학년</th>
                <th>학습과정</th>
                <th style="width: 80px;" class="text-center">수강인원</th>
                <th style="width: 180px;">개설기간</th>
                <th style="width: 60px;" class="text-center">관리</th>
                <th style="width: 80px;" class="text-center">수강신청</th>
            </tr>
        </thead>
        <tbody>
            <!-- 1번 데이터 -->
            <tr id="row-1">
                <td class="text-center">1</td>
                <td class="text-center" data-status="운영중">운영중</td>
                <td><strong data-classname="01_초등학교과정">01_초등학교과정</strong></td>
                <td data-teacher="백승태">백승태</td>
                <td>초등5</td>
                <td>[표준18] 초5-1-1.2.3 단원</td>
                <td class="text-center">1</td>
                <td data-period="20200302 ~ 20201230">20200302 ~ 20201230</td>
                <!-- 🔗 수정 버튼 클릭 시 해당 행의 데이터를 팝업창으로 보냅니다 -->
                <td class="text-center"><span class="link-action" onclick="openEditModal('row-1')">수정</span></td>
                <td class="text-center"><span class="link-action">+</span></td>
            </tr>
            <!-- 2번 데이터 -->
            <tr id="row-2">
                <td class="text-center">2</td>
                <td class="text-center" data-status="운영중">운영중</td>
                <td><strong data-classname="02_중학교과정">02_중학교과정</strong></td>
                <td data-teacher="백승태">백승태</td>
                <td>중3</td>
                <td>[표준18] 중3-1-3.4 단원</td>
                <td class="text-center">1</td>
                <td data-period="20200302 ~ 20201230">20200302 ~ 20201230</td>
                <td class="text-center"><span class="link-action" onclick="openEditModal('row-2')">수정</span></td>
                <td class="text-center"><span class="link-action">+</span></td>
            </tr>
        </tbody>
    </table>


    <!-- 🛠️ 등록 / 수정 겸용 모달 팝업 구조 -->
    <div class="modal-overlay" id="classModal">
        <div class="modal-box">
            <div class="modal-header">
                <!-- 자바스크립트로 타이틀 변경 (클래스 등록 ↔ 클래스 수정) -->
                <span id="modalTitle">클래스 등록</span>
                <button class="modal-close-x" onclick="closeModal()">✕</button>
            </div>
            
            <div class="modal-body">
                <form id="modalForm" onsubmit="saveModalData(event)">
                    <!-- 현재 수정 중인 행의 ID를 숨겨서 저장하는 칸 -->
                    <input type="hidden" id="editingRowId">

                    <table class="form-table">
                        <tr>
                            <th>클래스명</th>
                            <td>
                                <input type="text" id="modalClassName" class="input-classname" required>
                            </td>
                        </tr>
                        <tr>
                            <th>개설기간</th>
                            <td>
                                <input type="text" id="modalStartDate" class="input-date" placeholder="0000-00-00"> ~ 
                                <input type="text" id="modalEndDate" class="input-date" placeholder="0000-00-00">
                            </td>
                        </tr>
                        <tr>
                            <th>담당교사</th>
                            <td>
                                <select id="modalTeacher" class="select-teacher">
                                    <option value="">선택</option>
                                    <option value="백승태">백승태</option>
                                    <option value="박지혜">박지혜</option>
                                    <option value="최현서">최현서</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <th>운영상태</th>
                            <td>
                                <select id="modalStatus" class="select-status">
                                    <option value="운영중">운영중</option>
                                    <option value="중지">중지</option>
                                </select>
                            </td>
                        </tr>
                    </table>
                </form>
            </div>
            
            <div class="modal-footer">
                <!-- 자바스크립트로 버튼 글씨 변경 (등록 ↔ 수정) -->
                <button type="submit" form="modalForm" id="modalSubmitBtn" class="btn-modal">등록</button>
                <button type="button" class="btn-modal" onclick="closeModal()">닫기</button>
            </div>
        </div>
    </div>


    <script>
        // 1. [클래스 등록] 버튼 클릭 시 (빈 창 띄우기)
        function openRegisterModal() {
            document.getElementById('modalForm').reset(); // 기존 입력 데이터 초기화
            document.getElementById('editingRowId').value = ""; // 수정 모드 해제
            document.getElementById('modalTitle').innerText = "클래스 등록";
            document.getElementById('modalSubmitBtn').innerText = "등록";
            document.getElementById('classModal').style.display = 'flex';
        }

        // 2. 목록에서 [수정] 글씨 클릭 시 (원본 이미지처럼 기존 데이터 채워서 띄우기)
        function openEditModal(rowId) {
            const row = document.getElementById(rowId);
            
            // 테이블 행에 적혀있는 실제 데이터 추출
            const className = row.querySelector('[data-classname]').innerText;
            const teacher = row.querySelector('[data-teacher]').innerText;
            const status = row.querySelector('[data-status]').innerText;
            const period = row.querySelector('[data-period]').innerText;
            
            // 개설기간 분리 (20200302 ~ 20201230 -> 시작일, 종료일)
            const dates = period.split(' ~ ');
            const startDate = dates[0] || "";
            const endDate = dates[1] || "";

            // 팝업창 인풋박스에 값 넣기
            document.getElementById('editingRowId').value = rowId;
            document.getElementById('modalClassName').value = className;
            document.getElementById('modalStartDate').value = startDate;
            document.getElementById('modalEndDate').value = endDate;
            document.getElementById('modalTeacher').value = teacher;
            document.getElementById('modalStatus').value = status;

            // 팝업창 타이틀 및 버튼 이름 '수정'으로 변경 (보내주신 스크린샷 매칭)
            document.getElementById('modalTitle').innerText = "클래스 수정";
            document.getElementById('modalSubmitBtn').innerText = "수정";
            
            document.getElementById('classModal').style.display = 'flex';
        }

        // 3. 모달창 닫기
        function closeModal() {
            document.getElementById('classModal').style.display = 'none';
        }

        // 4. [등록] 또는 [수정] 버튼 클릭 시 데이터 처리
        function saveModalData(event) {
            event.preventDefault();
            
            const rowId = document.getElementById('editingRowId').value;
            const className = document.getElementById('modalClassName').value;
            const startDate = document.getElementById('modalStartDate').value;
            const endDate = document.getElementById('modalEndDate').value;
            const teacher = document.getElementById('modalTeacher').value;
            const status = document.getElementById('modalStatus').value;

            if (rowId) {
                // 💡 수정 모드일 때: 목록 테이블의 내용을 실시간으로 변경해 줍니다!
                const row = document.getElementById(rowId);
                row.querySelector('[data-classname]').innerText = className;
                row.querySelector('[data-teacher]').innerText = teacher;
                row.querySelector('[data-status]').innerText = status;
                row.querySelector('[data-period]').innerText = `${startDate} ~ ${endDate}`;
                
                alert("💾 클래스 수정 정보가 목록에 실시간 반영되었습니다!");
            } else {
                // 등록 모드일 때
                alert("🎉 새로운 수학 클래스가 리스트에 등록되었습니다!");
            }
            
            closeModal();
        }
    </script>

</body>
</html>

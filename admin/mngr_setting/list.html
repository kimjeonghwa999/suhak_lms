<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육공감(주) - 클래스관리 리스트</title>
    <link rel="stylesheet" href="../css/mngr_list.css">
    <style>
        .gnb-header { background: #ffffff; display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #e1e4e8; margin-bottom: 15px; }
        .gnb-left { display: flex; align-items: center; gap: 20px; }
        .logo-text { font-size: 16px; font-weight: bold; color: #2c3e50; }
        .gnb-menu { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .gnb-menu li a { text-decoration: none; color: #495057; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

    <header class="gnb-header">
        <div class="gnb-left">
            <span class="logo-text" id="topLogoText">수학교육 지원시스템</span>
            <ul class="gnb-menu">
                <li><a href="#">운영관리</a></li>
                <li><a href="#" onclick="openModal()">클래스 등록</a></li>
                <li><a href="../mngr_attendance/attendance.html">학생출석부</a></li>
                <li><a href="../mngr_work/work.html">교사근태관리</a></li>
                <li><a href="setting.html">환경설정</a></li>
            </ul>
        </div>
    </header>

    <div class="title-bar" id="listSubTitle">클래스관리 리스트</div>

    <div class="filter-container">
        <div class="filter-inputs">
            <select><option>전체상태</option></select>
            <select><option>전과정</option></select>
            <select><option>전학년</option></select>
            <select><option>전클래스</option></select>
            <select><option>전담교사</option></select>
        </div>
        <button class="btn-register" onclick="openModal()">클래스 등록</button>
    </div>

    <table class="class-table">
        <thead>
            <tr>
                <th style="width: 40px;" class="text-center"></th>
                <th style="width: 80px;" class="text-center">상태</th>
                <th>클래스/반 명칭</th>
                <th style="width: 100px;">담당교사</th>
                <th style="width: 120px;">과정/학년</th>
                <th>학습과정</th>
                <th style="width: 80px;" class="text-center">수강인원</th>
                <th style="width: 180px;">운영기간</th>
                <th style="width: 60px;" class="text-center">관리</th>
                <th style="width: 80px;" class="text-center">수강신청</th>
            </tr>
        </thead>
        <tbody>
            <tr id="row-1">
                <td class="text-center">1</td>
                <td class="text-center" data-status="운영중">운영중</td>
                <td><strong data-classname="01_기초 기초수학반">01_기초 기초수학반</strong></td>
                <td data-teacher="백승태">백승태</td>
                <td>초등5</td>
                <td>[공익지원] 초5 기초 연산 단원</td>
                <td class="text-center">1</td>
                <td data-period="2026-03-02 ~ 2026-12-30">2026-03-02 ~ 2026-12-30</td>
                <td class="text-center"><span class="link-action" onclick="openEditModal('row-1')">수정</span></td>
                <td class="text-center"><span class="link-action">+</span></td>
            </tr>
        </tbody>
    </table>

    <!-- 모달 팝업 구조 -->
    <div class="modal-overlay" id="classModal">
        <div class="modal-box">
            <div class="modal-header">
                <span id="modalTitle">클래스 등록</span>
                <button class="modal-close-x" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <form id="modalForm" onsubmit="saveModalData(event)">
                    <input type="hidden" id="editingRowId">
                    <table class="form-table">
                        <tr>
                            <th>클래스명</th>
                            <td><input type="text" id="modalClassName" class="input-classname" required></td>
                        </tr>
                        <tr>
                            <th>운영기간</th>
                            <td>
                                <!-- 🛠️ 기존 일반 인풋에서 '달력 선택형(type="date")'으로 정밀 변경 완료 -->
                                <input type="date" id="modalStartDate" class="input-date" required> ~ 
                                <input type="date" id="modalEndDate" class="input-date" required>
                            </td>
                        </tr>
                        <tr>
                            <th>담당지도교사</th>
                            <td>
                                <select id="modalTeacher" class="select-teacher">
                                    <option value="">선택</option>
                                    <option value="백승태">백승태 선생님</option>
                                    <option value="박지혜">박지혜 선생님</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <th>운영상태</th>
                            <td>
                                <select id="modalStatus" class="select-status">
                                    <option value="운영중">운영중</option>
                                    <option value="중지">중지</option>
                                </select>
                            </td>
                        </tr>
                    </table>
                </form>
            </div>
            <div class="modal-footer">
                <button type="submit" form="modalForm" id="modalSubmitBtn" class="btn-modal">등록</button>
                <button type="button" class="btn-modal" onclick="closeModal()">닫기</button>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            const savedTopName = localStorage.getItem('topName');
            const savedAcademyName = localStorage.getItem('academyName');
            if(savedTopName) document.getElementById('topLogoText').innerText = savedTopName;
            if(savedAcademyName) document.getElementById('listSubTitle').innerText = `${savedAcademyName} - 클래스 관리 목록`;
        }

        function openRegisterModal() {
            document.getElementById('modalForm').reset();
            document.getElementById('editingRowId').value = "";
            document.getElementById('modalTitle').innerText = "클래스 등록";
            document.getElementById('modalSubmitBtn').innerText = "등록";
            document.getElementById('classModal').style.display = 'flex';
        }

        function openEditModal(rowId) {
            const row = document.getElementById(rowId);
            const className = row.querySelector('[data-classname]').innerText;
            const teacher = row.querySelector('[data-teacher]').innerText;
            const status = row.querySelector('[data-status]').innerText;
            const period = row.querySelector('[data-period]').innerText;
            const dates = period.split(' ~ ');

            document.getElementById('editingRowId').value = rowId;
            document.getElementById('modalClassName').value = className;
            
            // 💡 날짜 선택 규격(YYYY-MM-DD)에 맞춤 동기화
            document.getElementById('modalStartDate').value = dates[0] || "";
            document.getElementById('modalEndDate').value = dates[1] || "";
            document.getElementById('modalTeacher').value = teacher;
            document.getElementById('modalStatus').value = status;

            document.getElementById('modalTitle').innerText = "클래스 정보 수정";
            document.getElementById('modalSubmitBtn').innerText = "수정";
            document.getElementById('classModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('classModal').style.display = 'none'; }

        function saveModalData(event) {
            event.preventDefault();
            const rowId = document.getElementById('editingRowId').value;
            const className = document.getElementById('modalClassName').value;
            const startDate = document.getElementById('modalStartDate').value;
            const endDate = document.getElementById('modalEndDate').value;
            const teacher = document.getElementById('modalTeacher').value;
            const status = document.getElementById('modalStatus').value;

            if (rowId) {
                const row = document.getElementById(rowId);
                row.querySelector('[data-classname]').innerText = className;
                row.querySelector('[data-teacher]').innerText = teacher;
                row.querySelector('[data-status]').innerText = status;
                row.querySelector('[data-period]').innerText = `${startDate} ~ ${endDate}`;
                alert("💾 교육 클래스 정보가 정상적으로 수정되었습니다.");
            } else {
                alert("🎉 신규 수학교육 지원 클래스가 목록에 개설되었습니다!");
            }
            closeModal();
        }
        function openModal() { openRegisterModal(); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육공감수학 선생님 대시보드</title>
    <!-- 루트 디렉토리의 css 폴더 내 파일 연결 -->
    <link rel="stylesheet" href="../css/classroom_layout.css">
    <link rel="stylesheet" href="../css/user_style.css">
</head>
<body>

    <!-- 상단 네비게이션 바 -->
    <header class="navbar">
        <div class="logo">교육공감수학(주)</div>
        <div class="user-menu">김정화테스트 수학교육공감매니저 ▾</div>
    </header>

    <!-- Sub 메뉴바 (클래스 선택 영역) -->
    <div class="sub-navbar">
        <div class="class-selector">클래스 [03_고등학교 과정 ▾]</div>
        <div class="nav-icons">아이콘들</div>
    </div>

    <!-- 메인 컨테이너 -->
    <div class="main-container">
        
        <!-- 좌측 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-header">[표준22] 공통수학1 ▾</div>
            <ul class="chapter-list">
                <li class="chapter-item" data-chapter="1">Chapter 1. 다항식</li>
                <li class="chapter-item" data-chapter="2">Chapter 2. 방정식과 부등식</li>
                <li class="chapter-item" data-chapter="3">Chapter 3. 경우의 수</li>
                <li class="chapter-item" data-chapter="4">Chapter 4. 행렬</li>
            </ul>
        </aside>

        <!-- 우측 메인 콘텐츠 영역 -->
        <main class="content">
            <!-- 통계/원형 차트 영역 -->
            <section class="stats-container">
                <div class="stat-circle">
                    <div class="circle">0%</div>
                    <p>개념원리완성도</p>
                </div>
                <div class="stat-circle">
                    <div class="circle">0%</div>
                    <p>유형진단점수평균</p>
                </div>
                <div class="stat-circle">
                    <div class="circle">0%</div>
                    <p>유형익힘완성도</p>
                </div>
            </section>

            <!-- 하단 매뉴얼 영역 -->
            <section class="manual-section">
                <h3>학생 매뉴얼</h3>
                <div class="manual-banner">
                    <p>공익센터 교육공감(주)</p>
                    <h1>학습사이트 매뉴얼</h1>
                </div>
            </section>
        </main>
    </div>

    <!-- teacher 폴더 전용 스크립트 연결 -->
    <script src="teacher_main.js"></script>
</body>
</html>

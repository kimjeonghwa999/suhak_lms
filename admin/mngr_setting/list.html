<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육공감(주) - 클래스관리 리스트</title>
    <link rel="stylesheet" href="../css/mngr_list.css">
</head>
<body>

    <div class="title-bar">클래스관리 리스트</div>

    <div class="filter-container">
        <div class="filter-inputs">
            <select><option>전체</option></select>
            <select><option>전과정</option></select>
            <select><option>전학년</option></select>
            <select><option>전클래스</option></select>
            <select><option>전교사</option></select>
        </div>
        <button class="btn-register" onclick="openModal()">클래스 등록</button>
    </div>

    <!-- 목록 테이블 -->
    <table class="class-table">
        <thead>
            <tr>
                <th style="width: 40px;" class="text-center"></th>
                <th style="width: 80px;" class="text-center">상태</th>
                <th>클래스명</th>
                <th style="width: 100px;">담당교사</th>
                <th style="width: 120px;">과정/학년</th>
                <th>학습과정</th>
                <th style="width: 80px;" class="text-center">수강인원</th>
                <th style="width: 180px;">개설기간</th>
                <th style="width: 60px;" class="text-center">관리</th>
                <th style="width: 80px;" class="text-center">수강신청</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="text-center">1</td>
                <td class="text-center">운영중</td>
                <td><strong>01_초등학교과정</strong></td>
                <td>백승태</td>
                <td>초등5</td>
                <td>[표준18] 초5-1-1.2.3 단원</td>
                <td class="text-center">1</td>
                <td>20200302 ~ 20201230</td>
                <td class="text-center"><span class="link-action">수정</span></td>
                <td class="text-center"><span class="link-action">+</span></td>
            </tr>
        </tbody>
    </table>


    <!-- 🛠️ 원본 스크린샷 완벽 재현 모달 팝업 구조 -->
    <div class="modal-overlay" id="classModal">
        <div class="modal-box">
            <div class="modal-header">
                <span>클래스 등록</span>
                <button class="modal-close-x" onclick="closeModal()">✕</button>
            </div>
            
            <div class="modal-body">
                <form id="modalForm" onsubmit="saveModalData(event)">
                    <table class="form-table">
                        <tr>
                            <th>클래스명</th>
                            <td>
                                <input type="text" class="input-classname" required>
                            </td>
                        </tr>
                        <tr>
                            <th>개설기간</th>
                            <td>
                                <input type="text" class="input-date" placeholder="0000-00-00"> ~ 
                                <input type="text" class="input-date" placeholder="0000-00-00">
                            </td>
                        </tr>
                        <tr>
                            <th>담당교사</th>
                            <td>
                                <select class="select-teacher">
                                    <option value="">선택</option>
                                    <option value="백승태">백승태</option>
                                    <option value="박지혜">박지혜</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <th>운영상태</th>
                            <td>
                                <select class="select-status">
                                    <option value="운영중">운영중</option>
                                    <option value="중지">중지</option>
                                </select>
                            </td>
                        </tr>
                    </table>
                </form>
            </div>
            
            <div class="modal-footer">
                <button type="submit" form="modalForm" class="btn-modal">등록</button>
                <button type="button" class="btn-modal" onclick="closeModal()">닫기</button>
            </div>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('classModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('classModal').style.display = 'none'; }
        function saveModalData(event) {
            event.preventDefault();
            alert("🎉 클래스가 성공적으로 등록되었습니다.");
            closeModal();
            document.getElementById('modalForm').reset();
        }
    </script>
</body>
</html>

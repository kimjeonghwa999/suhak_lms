<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MEGASTUDYMATH 어드민</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 상단 파랑 바 */
        header { background-color: #2159a5; color: white; height: 45px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        header .logo { font-weight: bold; font-size: 15px; }
        header .top-menu { display: flex; gap: 15px; font-size: 11px; }

        /* 하단 프레임 레이아웃 구역 */
        .wrapper { display: flex; flex: 1; height: calc(100vh - 45px); }
        iframe { border: none; height: 100%; }
    </style>
</head>
<body>

    <header>
        <div class="logo">MEGASTUDYMATH</div>
        <div class="top-menu">
            <span>SYSTEM</span> <span>도움말</span> <span>어드민(admin)</span>
        </div>
    </header>

    <div class="wrapper">
        <!-- 왼쪽 블랙 메뉴 분리 수용 -->
        <iframe src="sidebar.html" style="width: 200px;"></iframe>
        
        <!-- 오른쪽 메인 콘텐츠 영역 (기본으로 content.html을 보여주고, 메뉴 클릭시 바뀜) -->
        <iframe src="content.html" name="mainFrame" style="flex: 1;"></iframe>
    </div>

</body>
</html>

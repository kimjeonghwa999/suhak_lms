<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학원 통합 관리 시스템</title>
    <!-- 🔗 분리된 메인 전용 외부 스타일시트 정밀 연결 -->
    <link rel="stylesheet" href="admin/css/main_style.css">
</head>
<body>

    <!-- 상단 헤더 영역 -->
    <div class="top-header" id="mainHeaderTitle">
        🏢 학원 통합 관리 시스템
    </div>

    <!-- 메인 대시보드 내용 -->
    <div class="main-content">
        <div class="welcome-card">
            <h2>반갑습니다! 원장님</h2>
            <p>하단 메뉴를 터치하시면 각 관리 시스템 페이지로 즉시 이동합니다.</p>
        </div>
    </div>

    <!-- 📱 하단 고정 내비게이션 바 메뉴 -->
    <nav class="bottom-nav-bar">
        <!-- 1. 가맹학원 목록 이동 -->
        <a href="admin/mngr_setting/list.html" class="nav-item">
            <div class="nav-icon">📋</div>
            <div class="nav-text">가맹목록</div>
        </a>
        
        <!-- 2. 신규 학원등록 이동 -->
        <a href="admin/mngr_setting/register.html" class="nav-item">
            <div class="nav-icon">➕</div>
            <div class="nav-text">학원등록</div>
        </a>
        
        <!-- 3. 학생 등원 키패드 이동 -->
        <a href="admin/mngr_attendance/pad.html" class="nav-item">
            <div class="nav-icon">⏱️</div>
            <div class="nav-text">출석패드</div>
        </a>
        
        <!-- 4. 교사 근태관리 이동 -->
        <a href="admin/mngr_work/work.html" class="nav-item">
            <div class="nav-icon">📅</div>
            <div class="nav-text">근태관리</div>
        </a>
        
        <!-- 5. 시스템 환경설정 이동 -->
        <a href="admin/mngr_setting/setting.html" class="nav-item">
            <div class="nav-icon">⚙️</div>
            <div class="nav-text">환경설정</div>
        </a>
    </nav>

    <script>
        // 시스템 설정에 저장된 고유 학원명이 있다면 메인 상단 타이틀에 자동 반영
        window.onload = function() {
            const savedAcademyName = localStorage.getItem('academyName');
            if(savedAcademyName) {
                document.getElementById('mainHeaderTitle').innerText = `🏢 ${savedAcademyName} 관리 시스템`;
            }
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육공감(주) - 클래스관리 리스트</title>
    <!-- 분리된 전용 폴더의 외부 스타일시트 정밀 연결 -->
    <link rel="stylesheet" href="../css/admin/mngr_class_list1.css">
</head>
<body>

    <!-- 메인 GNB 상단 바 -->
    <header class="gnb-header">
        <div class="gnb-left">
            <span class="logo-text">교육공감(주)</span>
        </div>
        
        <ul class="gnb-menu">
            <li><a href="#">운영관리 ▾</a></li>
            <li><a href="#">등록관리 ▾</a></li>
            <li><a href="#">학원관리 ▾</a></li>
        </ul>

        <div class="gnb-right">
            <span class="icon-setting">⚙</span>
            <span class="user-profile">교육공감수학 원장 ▾</span>
        </div>
    </header>

    <!-- 메인 본문 영역 -->
    <main class="content-container">
        
        <!-- 서브 타이틀 구역 -->
        <div class="sub-title-bar">
            <h1 class="page-title">클래스관리 <span>리스트</span></h1>
        </div>

        <!-- 이미지 매칭 5단 셀렉터 필터 바 -->
        <div class="search-filter-bar">
            <select name="filter_total"><option value="">전체</option></select>
            <select name="filter_course"><option value="">전과정</option></select>
            <select name="filter_grade"><option value="">전학년</option></select>
            <select name="filter_class"><option value="">전클래스</option></select>
            <select name="filter_teacher"><option value="">전교사</option></select>
        </div>

        <!-- 리스트 데이터 그리드 테이블 -->
        <div class="grid-table-wrapper">
            <table class="grid-table">
                <thead>
                    <tr>
                        <th style="width: 45px;"></th>
                        <th style="width: 75px;">상태</th>
                        <th>클래스명</th>
                        <th style="width: 90px;">담당교사</th>
                        <th style="width: 110px;">과정/학년</th>
                        <th>학습과정</th>
                        <th style="width: 80px;">수강인원</th>
                        <th style="width: 100px;">수강신청</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Row 1 -->
                    <tr>
                        <td class="align-center">1</td>
                        <td class="align-center text-orange">운영중</td>
                        <td class="align-left">01_초등직교과정</td>
                        <td class="align-center">백승태</td>
                        <td class="align-center">소등5</td>
                        <td class="align-left">[표준18] 초5-1-1.2.3 단원</td>
                        <td class="align-center">1</td>
                        <td class="align-center"><a href="#" class="btn-add-request">+</a></td>
                    </tr>
                    <!-- Row 2 -->
                    <tr>
                        <td class="align-center">2</td>
                        <td class="align-center text-orange">운영중</td>
                        <td class="align-left">02_중학교과정</td>
                        <td class="align-center">백승태</td>
                        <td class="align-center">중3</td>
                        <td class="align-left">[표준18] 중3-1-3.4 단원</td>
                        <td class="align-center">1</td>
                        <td class="align-center"><a href="#" class="btn-add-request">+</a></td>
                    </tr>
                    <!-- Row 3 -->
                    <tr>
                        <td class="align-center" rowspan="2">3</td>
                        <td class="align-center text-orange" rowspan="2">운영중</td>
                        <td class="align-left" rowspan="2">03_고등학교 과정</td>
                        <td class="align-center" rowspan="2">백승태</td>
                        <td class="align-center">미적분1</td>
                        <td class="align-left">미적분</td>
                        <td class="align-center">1</td>
                        <td class="align-center"><a href="#" class="btn-add-request">+</a></td>
                    </tr>
                    <tr>
                        <td class="align-center">확률과 통계</td>
                        <td class="align-left">[표준18] 확률과 통계</td>
                        <td class="align-center">1</td>
                        <td class="align-center"><a href="#" class="btn-add-request">+</a></td>
                    </tr>
                    <!-- Row 4 -->
                    <tr>
                        <td class="align-center">4</td>
                        <td class="align-center text-orange">운영중</td>
                        <td class="align-left">박지혜</td>
                        <td class="align-center">박지혜</td>
                        <td class="align-center"></td>
                        <td class="align-left"></td>
                        <td class="align-center">0</td>
                        <td class="align-center"><a href="#" class="btn-add-request">+</a></td>
                    </tr>
                    <!-- Row 5 -->
                    <tr>
                        <td class="align-center">5</td>
                        <td class="align-center text-orange">운영중</td>
                        <td class="align-left">최현서</td>
                        <td class="align-center">최현서</td>
                        <td class="align-center"></td>
                        <td class="align-left"></td>
                        <td class="align-center">0</td>
                        <td class="align-center"><a href="#" class="btn-add-request">+</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

</body>
</html>

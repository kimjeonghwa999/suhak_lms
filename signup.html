<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 회원가입 - 프로토타입</title>
    <!-- 로그인 화면과 통일감을 주기 위한 Tailwind CSS 로드 -->
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col justify-between">

    <!-- 상단 헤더 (로그인 페이지와 동일한 브랜딩 유지) -->
    <header class="p-6 max-w-6xl w-full mx-auto flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <img id="main-logo" src="https://icons8.com" alt="로고" class="h-10 object-contain">
            <span class="text-xl font-bold tracking-tight text-slate-700">교육공감수학(주)</span>
        </div>
        <a href="index.html" class="text-xs bg-slate-200 text-slate-600 px-3 py-1.5 rounded-full hover:bg-blue-600 hover:text-white transition font-medium">
            ← 로그인으로 이동
        </a>
    </header>

    <!-- 중앙 회원가입 섹션 -->
    <main class="flex-1 flex items-center justify-center px-4 mb-20">
        <div class="max-w-md w-full p-10 bg-white rounded-2xl shadow-xl shadow-slate-100 border border-slate-100 transform transition-all">
            
            <div class="text-center mb-8">
                <h2 class="text-2xl font-extrabold text-slate-800 tracking-tight">학생 회원가입</h2>
                <p class="text-sm text-slate-400 mt-2">아래 정보를 입력하여 회원가입을 완료해주세요.</p>
            </div>
            
            <!-- 가상 작동을 위한 폼 입력란 -->
            <form class="space-y-5" onsubmit="event.preventDefault();">
                
                <!-- 1. 아이디 입력 + 중복체크 -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">아이디</label>
                    <div class="flex space-x-2">
                        <input type="text" id="user-id" placeholder="사용할 아이디를 입력하세요" 
                            class="flex-1 p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white transition text-sm">
                        <button type="button" onclick="checkDuplicate()" 
                            class="bg-slate-800 text-white px-4 text-xs font-bold rounded-xl hover:bg-slate-700 active:scale-[0.97] transition whitespace-nowrap">
                            중복체크
                        </button>
                    </div>
                </div>

                <!-- 2. 비밀번호 -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">비밀번호</label>
                    <input type="password" id="user-pw" placeholder="비밀번호를 입력하세요" 
                        class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white transition text-sm">
                </div>

                <!-- 3. 비밀번호 확인 -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">비밀번호 확인</label>
                    <input type="password" id="user-pw-confirm" placeholder="비밀번호를 한 번 더 입력하세요" 
                        class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white transition text-sm">
                </div>

                <!-- 4. 학생 이름 -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">학생 이름</label>
                    <input type="text" id="user-name" placeholder="이름을 입력하세요" 
                        class="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white transition text-sm">
                </div>

                <!-- 5. 가입하기 버튼 -->
                <button type="button" onclick="handleSignup()" 
                    class="w-full bg-blue-600 text-white p-3.5 font-bold rounded-xl hover:bg-blue-700 active:scale-[0.99] transition shadow-lg shadow-blue-100 mt-4 text-center block">
                    회원가입
                </button>
            </form>
        </div>
    </main>

    <!-- 시연용 토스트/가상 데이터 스크립트 -->
    <script>
        // 1. 가상 중복체크 피드백
        function checkDuplicate() {
            const idInput = document.getElementById('user-id').value.trim();
            if(!idInput) {
                alert('아이디를 먼저 입력해 주세요.');
                return;
            }
            // 기획 시연용 고정 멘트
            alert(`[${idInput}]은 사용 가능한 아이디입니다.\n(DB 연동 시 실제 중복 여부를 실시간 조회하게 됩니다.)`);
        }

        // 2. 가상 회원가입 검증 시연
        function handleSignup() {
            const id = document.getElementById('user-id').value;
            const pw = document.getElementById('user-pw').value;
            const pwConfirm = document.getElementById('user-pw-confirm').value;
            const name = document.getElementById('user-name').value;

            if(!id || !pw || !name) {
                alert('빈칸을 모두 채워주세요!');
                return;
            }

            if(pw !== pwConfirm) {
                alert('비밀번호와 비밀번호 확인이 일치하지 않습니다.');
                return;
            }

            alert(`🎉 회원가입 성공 프로토타입 시연\n\n[${name}] 학생의 정보가 정상적으로 입력되었습니다.\n확인을 누르면 로그인 페이지로 돌아갑니다.`);
            location.href = 'index.html'; // 가입 성공 후 메인으로 튕겨주는 모션
        }
    </script>
</body>
</html>
